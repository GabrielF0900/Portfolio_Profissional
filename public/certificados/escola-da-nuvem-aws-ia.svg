<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="800" fill="url(#bgGradient)" />

    <!-- Decorative Elements -->
    <circle cx="150" cy="150" r="100" fill="#3b82f6" opacity="0.1" />
    <circle cx="1050" cy="650" r="120" fill="#3b82f6" opacity="0.1" />
    <circle cx="600" cy="400" r="80" fill="#1e40af" opacity="0.05" />

    <!-- Border -->
    <rect x="50" y="50" width="1100" height="700" fill="none" stroke="#3b82f6" stroke-width="3"
        opacity="0.3" rx="20" />

    <!-- Main Text -->
    <text x="600" y="350" font-family="Arial, sans-serif" font-size="120" font-weight="bold"
        text-anchor="middle" fill="url(#textGradient)">
        EM BREVE
    </text>

    <!-- Subtitle -->
    <text x="600" y="450" font-family="Arial, sans-serif" font-size="36" text-anchor="middle"
        fill="#94a3b8" opacity="0.8">
        Certificado da Escola da Nuvem
    </text>

    <!-- Sub-subtitle -->
    <text x="600" y="510" font-family="Arial, sans-serif" font-size="28" text-anchor="middle"
        fill="#64748b" opacity="0.7">
        AWS re/Start &amp; Inteligência Artificial
    </text>

    <!-- Decorative Line -->
    <line x1="300" y1="550" x2="900" y2="550" stroke="#3b82f6" stroke-width="2" opacity="0.3" />

    <!-- Footer Text -->
    <text x="600" y="680" font-family="Arial, sans-serif" font-size="20" text-anchor="middle"
        fill="#475569" opacity="0.9">
        Carga horária: 363 horas
    </text>
</svg>